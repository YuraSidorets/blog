name: "Publish Queued Posts"

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Publish due queued posts
        run: python tools/publish_queued_posts.py

      - name: Detect repo changes
        id: changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit published posts
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A _posts tools/post-queue
          git commit -m "Publish queued blog posts"

      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: git push
